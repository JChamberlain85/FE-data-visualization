<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telemetry Dashboard</title>
<script type="text/javascript" src="/eel.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: #1e1e1e;
        color: #fff;
        padding: 20px;
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    #header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }

    #status {
        padding: 5px 15px;
        border-radius: 5px;
        background: #333;
        font-weight: bold;
    }

    button {
        background: #333;
        color: #fff;
        border: 1px solid #555;
        padding: 6px 12px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #4CAF50;
    }

    .main-content {
        display: flex;
        flex: 1;
        gap: 20px;
        overflow: hidden;
    }

    /* 3D Container */
    #canvas-container {
        flex: 1;
        background: #000;
        border-radius: 8px;
        border: 1px solid #444;
        position: relative;
        overflow: hidden;
    }

    /* Data Pages Container */
    #data-container {
        flex: 1;
        overflow-y: auto;
    }

    .page { display: none; }
    .page.active { display: block; }

    .dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 10px;
    }

    /* Make cards clickable */
    .card {
        background: #2d2d2d;
        padding: 10px;
        border-radius: 8px;
        text-align: center;
        border: 1px solid #444;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
    }

    .card:hover {
        background: #3d3d3d;
        border-color: #00e5ff;
    }

    .label {
        font-size: 12px;
        color: #aaa;
        margin-bottom: 5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        pointer-events: none;
    }

    .value {
        font-size: 20px;
        font-weight: bold;
        color: #4CAF50;
        pointer-events: none;
    }

    /* Chart Modal Styles */
    #chart-modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80%;
        max-width: 800px;
        background: #222;
        padding: 20px;
        border-radius: 10px;
        border: 2px solid #00e5ff;
        z-index: 1000;
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
    }

    #chart-modal-close {
        float: right;
        background: red;
        border: none;
        padding: 5px 10px;
        color: white;
        cursor: pointer;
        border-radius: 4px;
    }

    #modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        z-index: 999;
    }
</style>
</head>

<body>

<div id="header">
    <h2>FE Car Data</h2>
    <div>
        <button onclick="showPage('page1')">Driver + Wheel Sensors</button>
        <button onclick="showPage('page2')">Thermals</button>
        <button onclick="showPage('page3')">Electricals/Powertrain</button>
        <button onclick="showPage('page4')">Driver Inputs</button>
        <button onclick="showPage('page5')">Safety/Faults</button>
        <button onclick="showPage('page6')">MISC</button>
        <button onclick="showPage('page7')">Fuses</button>
    </div>
    <div id="status" style="color: yellow;">Connecting...</div>
</div>

<div class="main-content">
    <div id="canvas-container"></div>

    <div id="data-container">
        <div id="page1" class="page active"><div id="dashboard-page1" class="dashboard"></div></div>
        <div id="page2" class="page"><div id="dashboard-page2" class="dashboard"></div></div>
        <div id="page3" class="page"><div id="dashboard-page3" class="dashboard"></div></div>
        <div id="page4" class="page"><div id="dashboard-page4" class="dashboard"></div></div>
        <div id="page5" class="page"><div id="dashboard-page5" class="dashboard"></div></div>
        <div id="page6" class="page"><div id="dashboard-page6" class="dashboard"></div></div>
        <div id="page7" class="page"><div id="dashboard-page7" class="dashboard"></div></div>
    </div>
</div>

<div id="modal-overlay" onclick="closeChart()"></div>
<div id="chart-modal">
    <button id="chart-modal-close" onclick="closeChart()">X</button>
    <h3 id="chart-title">Sensor Graph</h3>
    <canvas id="telemetryChart"></canvas>
</div>

<script>
/* ===============================
   DATA CONFIG & HISTORY
   =============================== */
const MAX_HISTORY_POINTS = 50; 
let sensorHistory = {}; // Stores arrays of past data for graphing
let currentChart = null;
let activeChartIndex = null;

const columnNames = [
    'Time', 'Steering Ang', 'Motor Spd', 'Wheel Spd FR', 'Wheel Spd FL', 'Wheel Spd BR', 'Wheel Spd BL', 
    'Suspension FR', 'Suspension FL', 'Suspension BR', 'Suspension BL',
    'Rotor Temp FR', 'Rotor Temp FL', 'Rotor Temp BR', 'Rotor Temp BL', 
    'Wheel Temp FR', 'Wheel Temp FL', 'Wheel Temp BR', 'Wheel Temp BL',
    'Motor Temp', 'MC Temp', 'Battery Temp', 'LV Battery Temp', 'Fluid Temp BL',
    'Battery Voltage', 'Battery Current', 'Battery SOC', 'DC Bus',
    'Phase A', 'Phase B', 'Phase C',
    'Cmd Torque', 'Torque FBK', 'Torque', 'Motor Spd', 'Drive Mode',
    'Throttle 1 Raw', 'Throttle 2 Raw', 'Throttle 1', 'Throttle 2', 'Throttle Diff',
    'Front Brake', 'Rear Brake', 'High Sense', 'Soft Plaus', 'Plaus Fault',
    'AMS Fault', 'IMD Fault', 'BSPD Fault', 'Hard Brake', 'Shut Down', 'Car State',
    'Brake Light', 'Ign 1', 'Ign 2',
    'QBAI', 'Air Pres FL', 'Air Pres BR', 'Extra 1',
    'Fuse 1', 'Fuse 2', 'Fuse 3', 'Fuse 4', 'Fuse 5', 'Fuse 6',
    'Fuse 7', 'Fuse 8', 'Fuse 9', 'Fuse 10', 'Fuse 11', 'Fuse 12', 'Fuse 13'
];

// Initialize history arrays
columnNames.forEach((name, i) => {
    sensorHistory[i] = [];
});

const pages = {
    page1: ['Time', 'Steering Ang', 'Motor Spd', 'Wheel Spd FR', 'Wheel Spd FL', 'Wheel Spd BR', 'Wheel Spd BL', 'Suspension FR', 'Suspension FL', 'Suspension BR', 'Suspension BL'],
    page2: ['Rotor Temp FR', 'Rotor Temp FL', 'Rotor Temp BR', 'Rotor Temp BL', 'Wheel Temp FR', 'Wheel Temp FL', 'Wheel Temp BR', 'Wheel Temp BL', 'Motor Temp', 'MC Temp', 'Battery Temp', 'LV Battery Temp', 'Fluid Temp BL'],
    page3: ['Battery Voltage', 'Battery Current', 'Battery SOC', 'DC Bus', 'Phase A', 'Phase B', 'Phase C', 'Cmd Torque', 'Torque FBK', 'Torque', 'Motor Spd', 'Drive Mode'],
    page4: ['Throttle 1 Raw', 'Throttle 2 Raw', 'Throttle 1', 'Throttle 2', 'Throttle Diff', 'Front Brake', 'Rear Brake', 'High Sense', 'Soft Plaus', 'Plaus Fault'],
    page5: ['AMS Fault', 'IMD Fault', 'BSPD Fault', 'Hard Brake', 'Shut Down', 'Car State', 'Brake Light', 'Ign 1', 'Ign 2'],
    page6: ['QBAI', 'Air Pres FL', 'Air Pres BR', 'Extra 1'],
    page7: ['Fuse 1', 'Fuse 2', 'Fuse 3', 'Fuse 4', 'Fuse 5', 'Fuse 6', 'Fuse 7', 'Fuse 8', 'Fuse 9', 'Fuse 10', 'Fuse 11', 'Fuse 12', 'Fuse 13']
};

/* ===============================
   BUILD DASHBOARDS
   =============================== */
function buildDashboard(pageId) {
    const container = document.getElementById(`dashboard-${pageId}`);
    container.innerHTML = "";

    pages[pageId].forEach(label => {
        const index = columnNames.indexOf(label);
        if (index === -1) return;

        const card = document.createElement("div");
        card.className = "card";
        // Attach click event to open the graph
        card.onclick = () => openChart(index, label);
        card.innerHTML = `
            <div class="label">${label}</div>
            <div class="value" id="${pageId}-val-${index}">-</div>
        `;
        container.appendChild(card);
    });
}

Object.keys(pages).forEach(buildDashboard);

function showPage(pageId) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(pageId).classList.add("active");
}

/* ===============================
   CHART.JS LOGIC
   =============================== */
function openChart(index, label) {
    activeChartIndex = index;
    document.getElementById('chart-title').innerText = label + " Over Time";
    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('chart-modal').style.display = 'block';

    const ctx = document.getElementById('telemetryChart').getContext('2d');
    
    if (currentChart) currentChart.destroy();

    currentChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(sensorHistory[index].length).fill(''),
            datasets: [{
                label: label,
                data: sensorHistory[index],
                borderColor: '#00e5ff',
                backgroundColor: 'rgba(0, 229, 255, 0.2)',
                borderWidth: 2,
                pointRadius: 0,
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            animation: false, // Turn off animation for real-time performance
            scales: {
                y: { grid: { color: '#444' } },
                x: { grid: { display: false } }
            },
            plugins: { legend: { display: false } }
        }
    });
}

function closeChart() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('chart-modal').style.display = 'none';
    activeChartIndex = null;
}

/* ===============================
   PYTHON → JS (EEL)
   =============================== */
eel.expose(update_status);
function update_status(msg, color) {
    const el = document.getElementById("status");
    el.innerText = msg;
    el.style.color = color;
}

eel.expose(update_sensor_data);
function update_sensor_data(data) {
    // 1. Update History Buffers
    data.forEach((val, i) => {
        if (sensorHistory[i]) {
            sensorHistory[i].push(val);
            if (sensorHistory[i].length > MAX_HISTORY_POINTS) {
                sensorHistory[i].shift(); // Remove oldest point
            }
        }
    });

    // 2. Update Visible HTML Cards
    const activePageCards = document.querySelectorAll(".page.active .value");
    activePageCards.forEach(el => {
        const index = el.id.split("-").pop();
        el.innerText = data[index] !== undefined ? data[index] : '-';
    });

    // 3. Update Chart if Open
    if (currentChart && activeChartIndex !== null) {
        currentChart.data.labels = Array(sensorHistory[activeChartIndex].length).fill('');
        currentChart.data.datasets[0].data = sensorHistory[activeChartIndex];
        currentChart.update();
    }
}

/* ===============================
   THREE.JS HOLOGRAPHIC CAR
   =============================== */
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5, 5, 5);
scene.add(dirLight);

// Holographic Materials
const holoMaterialBlue = new THREE.MeshStandardMaterial({
    color: 0x00e5ff,
    emissive: 0x0055ff,
    emissiveIntensity: 0.5,
    wireframe: true,
    transparent: true,
    opacity: 0.8
});

const holoMaterialRed = new THREE.MeshStandardMaterial({
    color: 0xff0000,
    emissive: 0xff0000,
    emissiveIntensity: 1,
    wireframe: true,
    transparent: true,
    opacity: 1.0
});

// Interactive Objects Group
const interactableParts = [];

// Placeholder Geometry (Replace this block later with GLTFLoader for your actual 3D model)
const carGroup = new THREE.Group();
const bodyGeo = new THREE.BoxGeometry(2, 0.5, 4);
const carBody = new THREE.Mesh(bodyGeo, holoMaterialBlue.clone());
carBody.name = "Chassis";
carGroup.add(carBody);
interactableParts.push(carBody);

// Placeholder Wheels
const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.2, 16);
const wheelPositions = [
    [-1.2, -0.2, 1.5], [1.2, -0.2, 1.5],  // Front Left, Right
    [-1.2, -0.2, -1.5], [1.2, -0.2, -1.5] // Back Left, Right
];

wheelPositions.forEach((pos, i) => {
    const wheel = new THREE.Mesh(wheelGeo, holoMaterialBlue.clone());
    wheel.rotation.z = Math.PI / 2;
    wheel.position.set(...pos);
    wheel.name = i < 2 ? "Front_Wheels" : "Rear_Wheels";
    carGroup.add(wheel);
    interactableParts.push(wheel);
});

scene.add(carGroup);
camera.position.set(4, 3, 5);
camera.lookAt(0, 0, 0);

// Raycasting (Hover & Click Logic)
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredMesh = null;

container.addEventListener('mousemove', (event) => {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(interactableParts);

    if (intersects.length > 0) {
        if (hoveredMesh !== intersects[0].object) {
            // Reset previous hovered
            if (hoveredMesh) hoveredMesh.material = holoMaterialBlue.clone();
            // Set new hovered
            hoveredMesh = intersects[0].object;
            hoveredMesh.material = holoMaterialRed.clone();
            container.style.cursor = "pointer";
        }
    } else {
        if (hoveredMesh) {
            hoveredMesh.material = holoMaterialBlue.clone();
            hoveredMesh = null;
            container.style.cursor = "default";
        }
    }
});

container.addEventListener('click', () => {
    if (hoveredMesh) {
        if (hoveredMesh.name === "Front_Wheels") showPage('page1');
        if (hoveredMesh.name === "Rear_Wheels") showPage('page3');
        if (hoveredMesh.name === "Chassis") showPage('page2');
    }
});

// Handle Window Resize
window.addEventListener('resize', () => {
    const width = container.clientWidth;
    const height = container.clientHeight;
    renderer.setSize(width, height);
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
});

// Animation Loop
function animate() {
    requestAnimationFrame(animate);
    carGroup.rotation.y += 0.005; // Slow rotation
    renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
