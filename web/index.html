<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telemetry Dashboard</title>
<script type="text/javascript" src="/eel.js"></script>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: #1e1e1e;
        color: #fff;
        padding: 20px;
    }

    #header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }

    #status {
        padding: 5px 15px;
        border-radius: 5px;
        background: #333;
        font-weight: bold;
    }

    button {
        background: #333;
        color: #fff;
        border: 1px solid #555;
        padding: 6px 12px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #4CAF50;
    }

    /* SPA pages */
    .page {
        display: none;
    }

    .page.active {
        display: block;
    }

    /* Dashboard grid */
    .dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 10px;
    }

    .card {
        background: #2d2d2d;
        padding: 10px;
        border-radius: 8px;
        text-align: center;
        border: 1px solid #444;
    }

    .label {
        font-size: 12px;
        color: #aaa;
        margin-bottom: 5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .value {
        font-size: 20px;
        font-weight: bold;
        color: #4CAF50;
    }
</style>
</head>

<body>

<!-- HEADER -->
<div id="header">
    <h2>FE Car Data</h2>
    <div>
        <button onclick="showPage('page1')">Page 1</button>
        <button onclick="showPage('page2')">Page 2</button>
    </div>
    <div id="status" style="color: yellow;">Connecting...</div>
</div>

<!-- PAGE 1 -->
<div id="page1" class="page active">
    <div id="dashboard-page1" class="dashboard"></div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
    <div id="dashboard-page2" class="dashboard"></div>
</div>

<script>
/* ===============================
   COLUMN DEFINITIONS
   =============================== */

// Full data order from Python
const columnNames = [
    'Time', 'Suspension FR', 'Wheel Spd FR', 'Rotor Tmp FR', 'Wheel Tmp FR', 
    'Steering Ang', 'Suspension FL', 'Wheel Spd FL', 'Rotor Tmp FL', 'Wheel Tmp FL', 
    'Air Pres FL', 'Suspension BR', 'Wheel Spd BR', 'Rotor Tmp BR', 'Wheel Tmp BR', 
    'Air Pres BR', 'Suspension BL', 'Wheel Spd BL', 'Rotor Tmp BL', 'Wheel Tmp BL', 
    'Fluid Tmp BL', 'Fuse 1', 'Fuse 2', 'Fuse 3', 'Fuse 4', 'Fuse 5', 'Fuse 6', 
    'Fuse 7', 'Fuse 8', 'Fuse 9', 'Fuse 10', 'Fuse 11', 'Fuse 12', 'Fuse 13', 
    'Throttle 1 Raw', 'Throttle 2 Raw', 'Throttle 1', 'Throttle 2', 'Front Brake', 
    'Rear Brake', 'MC Temp', 'Motor Temp', 'Batt Temp', 'LV Batt Temp', 'Motor Spd', 
    'Batt Volt', 'Drive Mode', 'Ign 1', 'Ign 2', 'AMS Fault', 'IMD Fault', 'BSPD Fault', 
    'Brake Light', 'Phase A', 'Phase B', 'Phase C', 'DC Bus', 'Cmd Torque', 'Torque Fbk', 
    'Soft Plaus', 'High Sense', 'Car State', 'QBAI', 'Plaus Fault', 'Hard Brake', 
    'Shut Down', 'Batt SOC', 'Batt Curr', 'Torque', 'Throt Diff', 'Extra 1'
];

// Which columns appear on each page
const pages = {
    page1: [
        'Time', 'Suspension FR', 'Wheel Spd FR', 'Rotor Tmp FR', 'Wheel Tmp FR', 
        'Steering Ang', 'Suspension FL', 'Wheel Spd FL', 'Rotor Tmp FL', 'Wheel Tmp FL', 
        'Air Pres FL', 'Suspension BR', 'Wheel Spd BR', 'Rotor Tmp BR', 'Wheel Tmp BR', 
        'Air Pres BR', 'Suspension BL', 'Wheel Spd BL', 'Rotor Tmp BL', 'Wheel Tmp BL', 
        'Fluid Tmp BL', 'Fuse 1', 'Fuse 2', 'Fuse 3', 'Fuse 4', 'Fuse 5', 'Fuse 6', 
        'Fuse 7', 'Fuse 8', 'Fuse 9', 'Fuse 10', 'Fuse 11', 'Fuse 12', 'Fuse 13', 
    ],
    page2: [
        'Throttle 1 Raw', 'Throttle 2 Raw', 'Throttle 1', 'Throttle 2', 'Front Brake', 
        'Rear Brake', 'MC Temp', 'Motor Temp', 'Batt Temp', 'LV Batt Temp', 'Motor Spd', 
        'Batt Volt', 'Drive Mode', 'Ign 1', 'Ign 2', 'AMS Fault', 'IMD Fault', 'BSPD Fault', 
        'Brake Light', 'Phase A', 'Phase B', 'Phase C', 'DC Bus', 'Cmd Torque', 'Torque Fbk', 
        'Soft Plaus', 'High Sense', 'Car State', 'QBAI', 'Plaus Fault', 'Hard Brake', 
        'Shut Down', 'Batt SOC', 'Batt Curr', 'Torque', 'Throt Diff', 'Extra 1'
    ]
};

/* ===============================
   BUILD DASHBOARDS
   =============================== */

function buildDashboard(pageId) {
    const container = document.getElementById(`dashboard-${pageId}`);
    container.innerHTML = "";

    pages[pageId].forEach(label => {
        const index = columnNames.indexOf(label);
        if (index === -1) return;

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="label">${label}</div>
            <div class="value" id="${pageId}-val-${index}">-</div>
        `;
        container.appendChild(card);
    });
}

buildDashboard("page1");
buildDashboard("page2");

/* ===============================
   PAGE SWITCHING
   =============================== */

function showPage(pageId) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(pageId).classList.add("active");
}

/* ===============================
   PYTHON → JS (EEL)
   =============================== */

eel.expose(update_status);
function update_status(msg, color) {
    const el = document.getElementById("status");
    el.innerText = msg;
    el.style.color = color;
}

eel.expose(update_sensor_data);
function update_sensor_data(data) {
    // Only update visible page
    document.querySelectorAll(".page.active .value").forEach(el => {
        const index = el.id.split("-").pop();
        el.innerText = data[index];
    });
}
</script>

</body>
</html>>
